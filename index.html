<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STROBILATION — Procedural Ocean Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <div id="hud">
    <div id="hud-title">
      <span class="hud-label">SYS</span>
      <span class="hud-name">STROBILATION</span>
      <span class="hud-sub">PROCEDURAL OCEAN ENGINE v1.0</span>
    </div>
    <div id="hud-status">
      <div class="status-row">
        <span class="status-key">STATE</span>
        <span class="status-val" id="status-state">NOMINAL</span>
      </div>
      <div class="status-row">
        <span class="status-key">ENTITIES</span>
        <span class="status-val" id="status-entities">0</span>
      </div>
      <div class="status-row">
        <span class="status-key">STRESS</span>
        <span class="status-val" id="status-stress">0</span>
      </div>
    </div>
  </div>

  <div id="controls-container"></div>

  <div id="overlay-anoxia">
    <div class="anoxia-text">DEAD ZONE DETECTED</div>
    <div class="anoxia-sub">ANOXIC EVENT IN PROGRESS — ALL AEROBIC LIFE ELIMINATED</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.0/dist/tweakpane.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
